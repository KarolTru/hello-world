<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>NorthCompass</title>
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="NorthCompass">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="icon" href="icon.svg">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div id="app">

    <!-- ── Start screen ── -->
    <div id="start-screen">
      <div id="start-icon">🧭</div>
      <h1>NorthCompass</h1>
      <p class="tagline">Find North. Change your world.</p>
      <button id="start-btn">Start Compass</button>
      <p class="hint">Tap to allow compass access</p>
    </div>

    <!-- ── Compass screen ── -->
    <div id="compass-screen" hidden>
      <p id="status">Spin to find North</p>

      <div id="dial-wrap">
        <svg id="dial" viewBox="-120 -120 240 240" xmlns="http://www.w3.org/2000/svg">
          <!-- Outer ring -->
          <circle r="110" fill="none" stroke="currentColor" stroke-width="1" opacity="0.2"/>
          <!-- Tick marks (built in JS) -->
          <g id="ticks"></g>
          <!-- Cardinal labels -->
          <text y="-88" text-anchor="middle" dominant-baseline="middle" class="cardinal north">N</text>
          <text x="88"  text-anchor="middle" dominant-baseline="middle" class="cardinal">E</text>
          <text y="88"  text-anchor="middle" dominant-baseline="middle" class="cardinal">S</text>
          <text x="-88" text-anchor="middle" dominant-baseline="middle" class="cardinal">W</text>
          <!-- Needle -->
          <g id="needle">
            <polygon points="0,-68 -7,2 7,2"  fill="#E53935"/>
            <polygon points="0,68 -7,-2 7,-2"  class="needle-s"/>
            <circle r="5" class="needle-hub"/>
          </g>
        </svg>
      </div>

      <p id="degrees">000°</p>
      <p id="quip"></p>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
